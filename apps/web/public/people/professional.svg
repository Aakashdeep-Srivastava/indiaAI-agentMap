    <ellipse cx="110" cy="48" rx="5.5" ry="4" fill="white"/>
    <circle cx="84" cy="48" r="3" fill="#3D6B5E"/>
    <circle cx="112" cy="48" r="3" fill="#3D6B5E"/>
